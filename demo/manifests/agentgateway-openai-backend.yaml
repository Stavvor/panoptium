---
# AgentGateway backend: native OpenAI provider.
# TLS to api.openai.com:443 is handled automatically.
# Auth: passthrough — forwards the client's Authorization header to OpenAI.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-backend
  namespace: panoptium-system
spec:
  ai:
    provider:
      openai: {}
  policies:
    auth:
      passthrough: {}
---
# Route: all traffic on the demo gateway goes to OpenAI backend.
# AgentGateway rewrites the path to /v1/chat/completions automatically.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-openai-route
  namespace: panoptium-system
spec:
  parentRefs:
  - name: e2e-gateway
    namespace: panoptium-system
  rules:
  - backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-backend
