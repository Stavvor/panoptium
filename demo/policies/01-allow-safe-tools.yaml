---
# Explicitly allow safe tools at high priority.
# Overrides lower-priority deny rules for these specific tools.
apiVersion: panoptium.io/v1alpha1
kind: AgentClusterPolicy
metadata:
  name: demo-allow-safe-tools
spec:
  targetSelector: {}
  enforcementMode: enforcing
  priority: 200
  rules:
    - name: allow-fetch
      severity: LOW
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName == 'fetch'"
      action:
        type: allow
    - name: allow-k8s-read
      severity: LOW
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName.startsWith('k8s_get')"
      action:
        type: allow
