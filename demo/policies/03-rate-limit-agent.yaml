---
# Rate-limit LLM requests to 5 per minute (intentionally low for demo).
# Triggers on llm_request (requests WITHOUT tools array).
# Demonstrates how Panoptium throttles runaway or misbehaving agents.
apiVersion: panoptium.io/v1alpha1
kind: AgentClusterPolicy
metadata:
  name: demo-rate-limit
spec:
  targetSelector: {}
  enforcementMode: enforcing
  priority: 300
  rules:
    - name: rate-limit-llm-requests
      severity: MEDIUM
      trigger:
        eventCategory: protocol
        eventSubcategory: llm_request
      action:
        type: rateLimit
        parameters:
          requestsPerMinute: "5"
          burstSize: "2"
