# RBAC for Panoptium to manage Tetragon TracingPolicy CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: panoptium-tetragon-manager
  labels:
    app.kubernetes.io/name: panoptium
    app.kubernetes.io/component: tetragon-integration
rules:
  # Allow Panoptium to manage TracingPolicy and TracingPolicyNamespaced CRDs.
  - apiGroups:
      - cilium.io
    resources:
      - tracingpolicies
      - tracingpoliciesnamespaced
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Allow reading Tetragon pod status for health checks.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: panoptium-tetragon-manager
  labels:
    app.kubernetes.io/name: panoptium
    app.kubernetes.io/component: tetragon-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: panoptium-tetragon-manager
subjects:
  - kind: ServiceAccount
    name: panoptium-controller-manager
    namespace: panoptium-system
