# Block any agent from calling shell_exec.
# Simplest possible policy — one trigger, one predicate, deny.
apiVersion: panoptium.io/v1alpha1
kind: AgentPolicy
metadata:
  name: deny-shell-exec
  namespace: default
spec:
  enforcementMode: enforcing
  priority: 100
  rules:
    - name: no-shell
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName == 'shell_exec'"
      action:
        type: deny
        parameters:
          message: "shell execution is not allowed for this agent"
      severity: HIGH
