# Restrict gateway ingress to pods in a specific namespace.
# Only pods in the "ai-agents" namespace can reach the ExtProc port.
#
# Usage: helm install panoptium chart/panoptium -f restrict-to-namespace.yaml
networkPolicy:
  enabled: true
  gatewayIngress:
    allowAllNamespaces: false
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ai-agents
