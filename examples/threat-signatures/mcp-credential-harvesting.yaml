# Detect tools that ask the LLM to extract or return credentials, API keys,
# or connection strings from the environment or configuration.
#
# Covers both tool descriptions (tool poisoning) and tool arguments (runtime injection).
apiVersion: panoptium.io/v1alpha1
kind: ThreatSignature
metadata:
  name: mcp-credential-harvesting
spec:
  protocols:
    - mcp
  category: data_exfiltration
  severity: CRITICAL
  mitreAtlas: "AML.T0048.002"
  description: >-
    Detects tool descriptions or arguments that instruct the LLM to extract
    credentials, API keys, connection strings, or secrets from the environment
    or application configuration.
  detection:
    patterns:
      - regex: '(?i)(extract|read|get|fetch|dump|list)\s+(all\s+)?(env|environment)\s*(vars?|variables?)?'
        weight: 0.8
        target: tool_description
      - regex: '(?i)(API_KEY|SECRET_KEY|DATABASE_URL|PRIVATE_KEY|ACCESS_TOKEN|AWS_SECRET)'
        weight: 0.85
        target: tool_args
      - regex: '(?i)(extract|read|get|fetch|dump|list)\s+(all\s+)?(env|environment)\s*(vars?|variables?)?'
        weight: 0.8
        target: tool_args
