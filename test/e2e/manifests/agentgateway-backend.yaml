apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: e2e-gateway
  namespace: panoptium-system
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mock-llm-backend
  namespace: panoptium-system
spec:
  ai:
    groups:
    - providers:
      - name: mock-openai
        openai: {}
        host: mock-llm.panoptium-system.svc.cluster.local
        port: 8080
