apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: panoptium-extproc
  namespace: panoptium-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-gateway
  traffic:
    extProc:
      backendRef:
        kind: Service
        name: panoptium-controller-manager-extproc
        namespace: panoptium-system
        port: 9001
