{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "panoptium.fullname" . }}-gateway-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "panoptium.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller-manager
  policyTypes:
    - Ingress
  ingress:
    - ports:
        {{- if .Values.extproc.enabled }}
        - port: {{ .Values.extproc.port }}
          protocol: TCP
        {{- end }}
      from:
        {{- if .Values.networkPolicy.gatewayIngress.allowAllNamespaces }}
        - namespaceSelector: {}
        {{- else }}
        {{- with .Values.networkPolicy.gatewayIngress.namespaceSelector }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- end }}
        {{- with .Values.networkPolicy.gatewayIngress.podSelector }}
        - podSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
{{- end }}
