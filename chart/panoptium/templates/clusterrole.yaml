apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "panoptium.fullname" . }}-manager
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
rules:
  # Core resources
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  # NetworkPolicy for quarantine enforcement
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  # AgentPolicy
  - apiGroups: [panoptium.io]
    resources: [agentpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [panoptium.io]
    resources: [agentpolicies/status]
    verbs: [get, patch, update]
  - apiGroups: [panoptium.io]
    resources: [agentpolicies/finalizers]
    verbs: [update]
  # ClusterAgentPolicy
  - apiGroups: [panoptium.io]
    resources: [agentclusterpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [panoptium.io]
    resources: [agentclusterpolicies/status]
    verbs: [get, patch, update]
  - apiGroups: [panoptium.io]
    resources: [agentclusterpolicies/finalizers]
    verbs: [update]
  # AgentProfile
  - apiGroups: [panoptium.io]
    resources: [agentprofiles]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [panoptium.io]
    resources: [agentprofiles/status]
    verbs: [get, patch, update]
  - apiGroups: [panoptium.io]
    resources: [agentprofiles/finalizers]
    verbs: [update]
  # ThreatSignature
  - apiGroups: [panoptium.io]
    resources: [threatsignatures]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [panoptium.io]
    resources: [threatsignatures/status]
    verbs: [get, patch, update]
  - apiGroups: [panoptium.io]
    resources: [threatsignatures/finalizers]
    verbs: [update]
  # AgentQuarantine
  - apiGroups: [panoptium.io]
    resources: [agentquarantines]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [panoptium.io]
    resources: [agentquarantines/status]
    verbs: [get, patch, update]
  - apiGroups: [panoptium.io]
    resources: [agentquarantines/finalizers]
    verbs: [update]
