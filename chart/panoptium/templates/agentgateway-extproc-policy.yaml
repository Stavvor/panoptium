{{- if .Values.gateway.extProcPolicy.enabled }}
# AgentGateway ExtProc policy: routes all LLM traffic through Panoptium's
# ExtProc filter for observation and policy enforcement.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: {{ include "panoptium.fullname" . }}-extproc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-policy
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.gateway.extProcPolicy.gatewayName | default "agentgateway" }}
  traffic:
    extProc:
      backendRef:
        kind: Service
        name: {{ include "panoptium.fullname" . }}-controller-manager-extproc
        namespace: {{ .Release.Namespace }}
        port: {{ .Values.extproc.port }}
{{- end }}
