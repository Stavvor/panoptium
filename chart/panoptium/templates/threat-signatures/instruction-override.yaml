{{- if .Values.threatSignatures.enabled }}
apiVersion: panoptium.io/v1alpha1
kind: PanoptiumThreatSignature
metadata:
  name: mcp-instruction-override
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    panoptium.io/managed-by: helm
    panoptium.io/signature-set: default
spec:
  protocols:
    - mcp
  category: prompt_injection
  severity: CRITICAL
  mitreAtlas: "AML.T0051.000"
  description: >-
    Detects instruction override attacks where a tool description tells the LLM
    to disregard, forget, or override its previous instructions, rules, or
    constraints. This is a high-confidence prompt injection indicator.
  detection:
    patterns:
      - regex: '(?i)(disregard|forget|override)\s+(all\s+)?(previous|prior|above)\s+(instructions?|rules?|constraints?)'
        weight: 0.9
        target: tool_description
{{- end }}
