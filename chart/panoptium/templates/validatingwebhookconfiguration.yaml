{{- if and .Values.webhook.enabled .Values.webhook.certManager }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "panoptium.fullname" . }}-validating
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "panoptium.fullname" . }}-webhook-cert
webhooks:
  - name: vagentpolicy.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "panoptium.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-agentpolicy
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [agentpolicies]
    sideEffects: None
  - name: vthreatsignature.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "panoptium.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-threatsignature
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [threatsignatures]
    sideEffects: None
{{- end }}
