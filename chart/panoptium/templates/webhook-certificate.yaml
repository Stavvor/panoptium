{{- if and .Values.webhook.enabled (not .Values.webhook.certManager) }}
{{- $fullname := include "panoptium.fullname" . }}
{{- $svcName := printf "%s-webhook.%s.svc" $fullname .Release.Namespace }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-webhook-cert" $fullname) }}
{{- if and $existingSecret $existingSecret.data }}
  {{- $caCert := index $existingSecret.data "ca.crt" }}
  {{- $tlsCrt := index $existingSecret.data "tls.crt" }}
  {{- $tlsKey := index $existingSecret.data "tls.key" }}
# Self-signed webhook certificate Secret (reusing existing cert on upgrade).
# For production use, set webhook.certManager=true and install cert-manager.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCrt }}
  tls.key: {{ $tlsKey }}
  ca.crt: {{ $caCert }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ $fullname }}-validating
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
webhooks:
  - name: vagentpolicy.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-agentpolicy
      caBundle: {{ $caCert }}
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [agentpolicies]
    sideEffects: None
  - name: vthreatsignature.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-threatsignature
      caBundle: {{ $caCert }}
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [threatsignatures]
    sideEffects: None
{{- else }}
  {{- $ca := genCA "panoptium-webhook-ca" 3650 }}
  {{- $cert := genSignedCert $svcName nil (list $svcName (printf "%s-webhook.%s.svc.cluster.local" $fullname .Release.Namespace)) 3650 $ca }}
# Self-signed webhook certificate Secret.
# For production use, set webhook.certManager=true and install cert-manager.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ $fullname }}-validating
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
webhooks:
  - name: vagentpolicy.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-agentpolicy
      caBundle: {{ $ca.Cert | b64enc }}
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [agentpolicies]
    sideEffects: None
  - name: vthreatsignature.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-panoptium-io-v1alpha1-threatsignature
      caBundle: {{ $ca.Cert | b64enc }}
    failurePolicy: Fail
    rules:
      - apiGroups: [panoptium.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [threatsignatures]
    sideEffects: None
{{- end }}
{{- end }}
{{- if and .Values.webhook.enabled .Values.webhook.certManager }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "panoptium.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "panoptium.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "panoptium.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-issuer
  secretName: {{ include "panoptium.fullname" . }}-webhook-cert
{{- end }}
